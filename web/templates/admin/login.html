{{define "login"}}<!doctype html>
<html lang="{{Locale}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{T "login.title"}} | {{T "app.name"}}</title>
<link rel="stylesheet" href="/admin/static/admin.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1><img src="/admin/static/sb_logo_gray.svg" alt="{{T `app.name`}}"></h1>
    {{if .Error}}<p class="alert error">{{.Error}}</p>{{end}}
    <form method="post" action="/admin/login{{if .Next}}?next={{.Next}}{{end}}">
      <label>{{T "login.name"}}
        <input type="text" name="name" value="{{.Name}}" autofocus required>
      </label>
      <label>{{T "login.password"}}
        <input type="password" name="password" required>
      </label>
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <button type="submit" class="primary">{{T "login.submit"}}</button>
    </form>
  </div>
</div>
</body>
</html>{{end}}
