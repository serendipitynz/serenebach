version: '3'

# Dotenv files are loaded into every task's environment. `.env` is the
# local-developer file (gitignored); `.env.example` is checked in as a
# template. Existing shell env vars take precedence — dotenv never
# overrides something the operator already set.
dotenv: ['.env']

vars:
  PKG: ./cmd/serenebach
  OUT: bin/serenebach

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  dev:
    desc: Run serenebach on :8080 with dev database
    cmds:
      - go run {{.PKG}} --addr=:8080 --db=./data/dev.db

  build:
    desc: Build the native binary
    cmds:
      - go build -o {{.OUT}} {{.PKG}}

  # Cross-compilation targets are named by build configuration
  # (GOOS-GOARCH) rather than by use case. Pure-Go SQLite
  # (modernc.org/sqlite) keeps CGO_ENABLED=0 viable on every target.
  # Output: bin/serenebach-{os}-{arch} (with .exe on windows).

  build-linux-amd64:
    desc: Cross-compile linux/amd64 (typical Linux servers, CGI hosts)
    cmds:
      - task: _cross
        vars: {GOOS: linux, GOARCH: amd64}

  build-linux-arm64:
    desc: Cross-compile linux/arm64 (Raspberry Pi, ARM VPS)
    cmds:
      - task: _cross
        vars: {GOOS: linux, GOARCH: arm64}

  build-freebsd-amd64:
    desc: Cross-compile freebsd/amd64
    cmds:
      - task: _cross
        vars: {GOOS: freebsd, GOARCH: amd64}

  build-freebsd-arm64:
    desc: Cross-compile freebsd/arm64
    cmds:
      - task: _cross
        vars: {GOOS: freebsd, GOARCH: arm64}

  build-windows-amd64:
    desc: Cross-compile windows/amd64
    cmds:
      - task: _cross
        vars: {GOOS: windows, GOARCH: amd64}

  build-windows-arm64:
    desc: Cross-compile windows/arm64
    cmds:
      - task: _cross
        vars: {GOOS: windows, GOARCH: arm64}

  build-darwin-amd64:
    desc: Cross-compile darwin/amd64 (Intel Mac)
    cmds:
      - task: _cross
        vars: {GOOS: darwin, GOARCH: amd64}

  build-darwin-arm64:
    desc: Cross-compile darwin/arm64 (Apple Silicon)
    cmds:
      - task: _cross
        vars: {GOOS: darwin, GOARCH: arm64}

  _cross:
    internal: true
    env:
      CGO_ENABLED: '0'
      GOOS: '{{.GOOS}}'
      GOARCH: '{{.GOARCH}}'
    cmds:
      - go build -ldflags="-s -w" -o {{.OUT}}-{{.GOOS}}-{{.GOARCH}}{{if eq .GOOS "windows"}}.exe{{end}} {{.PKG}}

  seed:
    desc: Create the initial weblog + admin user (idempotent)
    cmds:
      - go run {{.PKG}} --db=./data/dev.db seed

  migrate:
    desc: Apply any pending migrations (runs on every startup anyway)
    cmds:
      - go run {{.PKG}} --db=./data/dev.db migrate

  import:
    desc: "Import from a legacy SB3 SQLite db. Usage: task import -- /path/to/sb3.db"
    cmds:
      - go run {{.PKG}} --db=./data/dev.db import {{.CLI_ARGS}}

  build-site:
    desc: Render the public site as static HTML under ./data/public
    cmds:
      - go run {{.PKG}} --db=./data/dev.db build --out=./data/public

  test:
    desc: Run the Go test suite
    cmds:
      - go test ./...

  tidy:
    desc: Sync go.mod / go.sum
    cmds:
      - go mod tidy

  clean:
    desc: Remove build output and the dev database
    cmds:
      - rm -rf bin data dist

  release:
    desc: Cross-build all targets, package, checksum, tag, and create a draft GitHub release
    vars:
      VERSION:
        sh: awk -F'"' '/^const Public/ {print $2}' internal/version/version.go
      TAG: 'v{{.VERSION}}'
      UNIX_TARGETS: linux-amd64 linux-arm64 freebsd-amd64 freebsd-arm64 darwin-amd64 darwin-arm64
      WIN_TARGETS: windows-amd64 windows-arm64
    cmds:
      - |
        set -euo pipefail
        TAG="{{.TAG}}"

        # Pre-flight: refuse to release from a dirty tree or over an
        # existing tag — both are irreversible if pushed.
        if [ -n "$(git status --porcelain)" ]; then
          echo "ERROR: working tree is dirty. Commit or stash before releasing." >&2
          exit 1
        fi
        if git rev-parse --verify --quiet "$TAG" >/dev/null; then
          echo "ERROR: tag $TAG already exists locally. Bump internal/version/version.go first." >&2
          exit 1
        fi
        if git ls-remote --tags --exit-code origin "$TAG" >/dev/null 2>&1; then
          echo "ERROR: tag $TAG already exists on origin." >&2
          exit 1
        fi

        rm -rf dist
        mkdir -p dist

        echo "==> Building $TAG for 8 targets"
      - for: { var: UNIX_TARGETS, split: ' ' }
        task: 'build-{{.ITEM}}'
      - for: { var: WIN_TARGETS, split: ' ' }
        task: 'build-{{.ITEM}}'
      - |
        set -euo pipefail
        TAG="{{.TAG}}"

        echo "==> Packaging tar.gz for unix targets"
        for target in {{.UNIX_TARGETS}}; do
          name="serenebach-${TAG}-${target}"
          stage="dist/${name}"
          mkdir -p "$stage"
          cp "bin/serenebach-${target}" "${stage}/serenebach"
          cp README.md README.ja.md LICENSE "$stage/"
          tar -C dist -czf "dist/${name}.tar.gz" "$name"
          rm -rf "$stage"
        done

        echo "==> Packaging zip for windows targets"
        for target in {{.WIN_TARGETS}}; do
          name="serenebach-${TAG}-${target}"
          stage="dist/${name}"
          mkdir -p "$stage"
          cp "bin/serenebach-${target}.exe" "${stage}/serenebach.exe"
          cp README.md README.ja.md LICENSE "$stage/"
          (cd dist && zip -qr "${name}.zip" "$name")
          rm -rf "$stage"
        done

        echo "==> Generating SHA256SUMS"
        (cd dist && shasum -a 256 *.tar.gz *.zip > SHA256SUMS)

        echo "==> Tagging $TAG and pushing"
        git tag "$TAG"
        git push origin "$TAG"

        echo "==> Creating draft GitHub release"
        gh release create "$TAG" \
          dist/*.tar.gz dist/*.zip dist/SHA256SUMS \
          --draft --generate-notes --title "$TAG"

        echo
        echo "Done. Review and publish the draft on GitHub."
