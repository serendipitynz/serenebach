services:
  serenebach:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - serenebach-data:/home/nonroot/data
    # Uncomment to set environment variables (see .env.example for available options).
    # environment:
    #   SB_AI_SECRET: ${SB_AI_SECRET}
    #   SB_ANALYTICS_DB: /home/nonroot/data/analytics.db
    #   SB_ANALYTICS_RETENTION_DAYS: "30"
    #   SB_UPLOAD_MAX_MB: "10"
    restart: unless-stopped

volumes:
  serenebach-data:
