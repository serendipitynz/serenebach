services:
  serenebach:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - serenebach-data:/home/nonroot/data
    environment:
      # Minimum: set a strong secret for AI credential encryption.
      # If you do not use AI features, any non-empty string is fine.
      - SB_AI_SECRET=change-me-to-a-long-random-string
      # Uncomment and adjust any other variables from .env.example as needed:
      # - SB_ANALYTICS_DB=/home/nonroot/data/analytics.db
      # - SB_ANALYTICS_RETENTION_DAYS=30
      # - SB_UPLOAD_MAX_MB=10
      # - SB_TURNSTILE_SITEKEY=
      # - SB_TURNSTILE_SECRET=
      # - SB_TRUSTED_PROXIES=10.0.0.0/8
    restart: unless-stopped

volumes:
  serenebach-data:
