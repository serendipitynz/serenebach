name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      # golangci-lint covers the standard set (errcheck / govet /
      # ineffassign / staticcheck / unused) plus the project linters
      # enabled in .golangci.yml — notably gocyclo at min-complexity 15
      # and gofmt (declared under `formatters:` in v2). Without this
      # step the config file would not be read and the gocyclo / gofmt
      # guards would silently no-op.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...
