name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            echo "Run 'gofmt -w .' locally and commit."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: go tool staticcheck ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...
