version: "2"

# Lint configuration for serenebach.
#
# Scope: this file establishes the lint baseline that any developer
# checkout (and, eventually, CI) can run as `golangci-lint run ./...`
# with a clean exit. Additional linters are turned on one batch at a
# time so review stays small; the v2 standard set plus the linters
# listed under `enable` below are the current baseline.

linters:
  default: standard
  enable:
    # All five of these came in already clean against the codebase
    # when surveyed — turning them on adds protection going forward
    # without requiring any code change today.
    - bodyclose      # http.Response.Body left unclosed
    - misspell       # English typos in comments / strings
    - nakedret       # named-return functions that omit the return values
    - prealloc       # slices that could be pre-allocated before append
    - wastedassign   # values assigned but never read
    # The next batch turns on linters whose findings were addressed
    # in the same PR that introduced them. Justified exceptions sit
    # next to the suppressed line as //nolint:<linter> comments.
    - contextcheck   # missing context propagation
    - errorlint      # err == sentinel comparisons that miss wrapped errors
    - gochecknoinits # init() side-effects
    - nilerr         # returning nil where the prior err was non-nil
    - rowserrcheck   # sql.Rows.Err() not called after iteration
    # Style + refactor batch.
    - gocritic       # general style / performance / refactor suggestions
    - nestif         # deeply-nested if blocks
    # Complexity batch.
    - gocognit       # cognitive complexity (nesting-weighted)
    # gocyclo enforces goreportcard's fixed threshold of 15. The
    # codebase was cleaned up to fit under it (see PRs #61–#74) so
    # the goreportcard `gocyclo` section sits at 100%. //nolint:gocyclo
    # is intentionally off-limits: raw gocyclo (= goreportcard) ignores
    # nolint pragmas, so suppressing here would silently demote the
    # score. If a function legitimately needs more branches, split it.
    - gocyclo        # cyclomatic complexity (15-cap, matches goreportcard)
    # Dead-parameter batch.
    - unparam        # parameters / returns that are dead or always the same
    # revive is opted into with a single rule rather than its default
    # bundle: most revive rules (`exported`, `unused-parameter`, ...)
    # are cosmetic for this project, but `redefines-builtin-id` catches
    # genuine breakage as Go's built-in surface keeps growing (`min` /
    # `max` arrived in 1.21, `any` in 1.18). Enabling the one rule
    # costs nothing and prevents the same shadowing from creeping back.
    - revive
  settings:
    gocyclo:
      # 15 matches the fixed threshold goreportcard.com uses. Anything
      # higher would let the goreportcard score drift below 100% with
      # no local signal.
      min-complexity: 15
    revive:
      # `rules` overrides revive's default ruleset, so listing only
      # `redefines-builtin-id` keeps the other revive rules off.
      rules:
        - name: redefines-builtin-id
    errcheck:
      # Exclude conventional Go patterns where dropping the error is
      # idiomatic, not negligent:
      #   - defer Close on Closer-shaped resources: cleanup-time failure
      #     is acceptable; the work the resource gated has already happened.
      #   - net/http response writers and fmt.Fprintf to writers: the
      #     caller has no way to react after headers/bytes are committed.
      #   - sql.Tx.Rollback in defer: a no-op after Commit; surfacing the
      #     ErrTxDone case provides no actionable signal.
      #   - os.RemoveAll for staging/temp cleanup: best-effort by design.
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*database/sql.Tx).Rollback
        - (net/http.ResponseWriter).Write
        - fmt.Fprintf
        - fmt.Fprintln
        - os.RemoveAll
  exclusions:
    rules:
      # Test files use the assertion idiom (Scan / Insert / Unmarshal /
      # ExecContext without checking the returned error) where the
      # surrounding *testing.T assertions or panic-on-bad-fixture style
      # already make the intent obvious. Strict errcheck here trades
      # readability for noise without catching real bugs.
      #
      # Cognitive complexity is also relaxed: end-to-end test functions
      # naturally accumulate sequential assertions and setup steps that
      # push gocognit past its threshold without indicating a refactor
      # opportunity — production code stays under the threshold.
      - path: _test\.go
        linters:
          - errcheck
          - gocognit
          # gocyclo is also relaxed in tests: integration tests stack
          # sequential setup + assertions that legitimately exceed 15
          # branches. goreportcard still counts these toward its score,
          # but the CI guard treats production code as the load-bearing
          # surface.
          - gocyclo
          # `unparam` is relaxed for test helpers: a fixture builder
          # whose `entryID` parameter currently always receives 1 is
          # signalling future flexibility, not dead code. The few real
          # production hits were addressed inline.
          - unparam
      # The helpdocs package uses an init() to eagerly parse the embed.FS
      # of Markdown help pages at startup. A package-level Load() would
      # require every entry point (cmd/serenebach, MCP, importer, ...)
      # to remember to call it; init() is the documented Go idiom for
      # this kind of one-shot package bootstrap.
      - path: docs/help/embed\.go
        linters:
          - gochecknoinits
