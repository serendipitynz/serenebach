version: "2"

# Lint configuration for serenebach.
#
# Scope: this file establishes the lint baseline that any developer
# checkout (and, eventually, CI) can run as `golangci-lint run ./...`
# with a clean exit. Additional linters are turned on one batch at a
# time so review stays small; the v2 standard set plus the linters
# listed under `enable` below are the current baseline.

linters:
  default: standard
  enable:
    # All five of these came in already clean against the codebase
    # when surveyed — turning them on adds protection going forward
    # without requiring any code change today.
    - bodyclose      # http.Response.Body left unclosed
    - misspell       # English typos in comments / strings
    - nakedret       # named-return functions that omit the return values
    - prealloc       # slices that could be pre-allocated before append
    - wastedassign   # values assigned but never read
  settings:
    errcheck:
      # Exclude conventional Go patterns where dropping the error is
      # idiomatic, not negligent:
      #   - defer Close on Closer-shaped resources: cleanup-time failure
      #     is acceptable; the work the resource gated has already happened.
      #   - net/http response writers and fmt.Fprintf to writers: the
      #     caller has no way to react after headers/bytes are committed.
      #   - sql.Tx.Rollback in defer: a no-op after Commit; surfacing the
      #     ErrTxDone case provides no actionable signal.
      #   - os.RemoveAll for staging/temp cleanup: best-effort by design.
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*database/sql.Tx).Rollback
        - (net/http.ResponseWriter).Write
        - fmt.Fprintf
        - fmt.Fprintln
        - os.RemoveAll
  exclusions:
    rules:
      # Test files use the assertion idiom (Scan / Insert / Unmarshal /
      # ExecContext without checking the returned error) where the
      # surrounding *testing.T assertions or panic-on-bad-fixture style
      # already make the intent obvious. Strict errcheck here trades
      # readability for noise without catching real bugs.
      - path: _test\.go
        linters:
          - errcheck
